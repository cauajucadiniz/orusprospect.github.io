<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Ferramenta</title>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230A0A0A"/><circle cx="50" cy="50" r="44" fill="none" stroke="%23C9A84C" stroke-width="2"/><circle cx="50" cy="50" r="34" fill="none" stroke="%23C9A84C" stroke-width="1"/><polygon points="50,14 82,70 18,70" fill="none" stroke="%23C9A84C" stroke-width="2.5" stroke-linejoin="round"/><line x1="50" y1="14" x2="50" y2="70" stroke="%23C9A84C" stroke-width="1" stroke-dasharray="3,3"/><line x1="50" y1="42" x2="18" y2="70" stroke="%23C9A84C" stroke-width="1" stroke-dasharray="3,3"/><line x1="50" y1="42" x2="82" y2="70" stroke="%23C9A84C" stroke-width="1" stroke-dasharray="3,3"/><circle cx="50" cy="42" r="2.5" fill="%23C9A84C"/><circle cx="50" cy="14" r="2" fill="%23C9A84C"/></svg>'>
    <style>
        body { background-color: #000; color: #D4AF37; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #111; padding: 40px; border-radius: 10px; border: 1px solid #D4AF37; box-shadow: 0px 0px 20px rgba(212, 175, 55, 0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; }
        input { width: 100%; padding: 12px; background-color: #222; border: 1px solid #444; border-radius: 5px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #D4AF37; }
        button { width: 100%; padding: 12px; background-color: #D4AF37; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: background 0.3s; }
        button:hover { background-color: #b8962e; }
        .logo { width: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Seu ícone SVG também como logo no formulário -->
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="none" stroke="#C9A84C" stroke-width="2"/><circle cx="50" cy="50" r="34" fill="none" stroke="#C9A84C" stroke-width="1"/><polygon points="50,14 82,70 18,70" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/><line x1="50" y1="14" x2="50" y2="70" stroke="#C9A84C" stroke-width="1" stroke-dasharray="3,3"/><circle cx="50" cy="42" r="2.5" fill="#C9A84C"/></svg>
        
        <h2>Solicitação de Acesso</h2>
        <form name="cadastro-equipe" method="POST" data-netlify="true" action="/sucesso.html">
            <div class="input-group">
                <label>E-mail Profissional</label>
                <input type="email" name="email" required>
            </div>
            <div class="input-group">
                <label>Chave de Acesso</label>
                <input type="text" name="chave_acesso" placeholder="Crie uma chave/senha" required>
            </div>
            <button type="submit">Finalizar Cadastro</button>
        </form>
    </div>
</body>
</html>
